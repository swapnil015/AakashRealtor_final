# ─────────────────────────────────────────────────────────────────────────────
#  aakashrealtor.com.conf — HOST nginx server block for the Nuxt site
#
#  Place at:  /etc/nginx/sites-available/aakashrealtor.com.conf
#  Enable:    ln -s ../sites-available/aakashrealtor.com.conf /etc/nginx/sites-enabled/
#  Reload:    nginx -t && systemctl reload nginx
#
#  This terminates TLS for the marketing/app site and reverse-proxies to the
#  Nuxt SSR container, which docker-compose publishes on 127.0.0.1:3000.
#
#  TLS:  obtain certs with certbot BEFORE enabling the 443 block:
#        sudo certbot --nginx -d aakashrealtor.com -d www.aakashrealtor.com
#  Certbot will insert the ssl_certificate lines; the managed paths below match
#  its defaults so you can also fill them in manually.
# ─────────────────────────────────────────────────────────────────────────────

# ── HTTP → HTTPS redirect (+ ACME http-01 challenge passthrough) ─────────────
server {
    listen 80;
    listen [::]:80;
    server_name aakashrealtor.com www.aakashrealtor.com;

    # Let certbot answer the ACME challenge over plain HTTP.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Redirect www → apex over HTTPS (canonical host) ──────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.aakashrealtor.com;

    ssl_certificate     /etc/letsencrypt/live/aakashrealtor.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aakashrealtor.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;       # certbot-managed
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://aakashrealtor.com$request_uri;
}

# ── Main HTTPS site → Nuxt SSR ───────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name aakashrealtor.com;

    ssl_certificate     /etc/letsencrypt/live/aakashrealtor.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aakashrealtor.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    server_tokens off;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Tighten/relax as the frontend requires.
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' https: data:; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com; style-src 'self' 'unsafe-inline'; connect-src 'self' https://api.aakashrealtor.com https://*.sentry.io; frame-ancestors 'self';" always;

    gzip on;
    gzip_vary on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types application/javascript application/json text/css text/plain image/svg+xml;

    client_max_body_size 16m;

    # Long-cache hashed Nuxt build assets.
    location /_nuxt/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;       # Nuxt SSR container
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 60s;
    }
}
