# ─────────────────────────────────────────────────────────────────────────────
#  api.aakashrealtor.com.conf — HOST nginx server block for the Laravel API
#
#  Place at:  /etc/nginx/sites-available/api.aakashrealtor.com.conf
#  Enable:    ln -s ../sites-available/api.aakashrealtor.com.conf /etc/nginx/sites-enabled/
#  Reload:    nginx -t && systemctl reload nginx
#
#  Terminates TLS for the API and reverse-proxies to the in-stack "web" nginx
#  (the one that fronts php-fpm), which docker-compose publishes on
#  127.0.0.1:8080.
#
#  TLS:  sudo certbot --nginx -d api.aakashrealtor.com
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    listen [::]:80;
    server_name api.aakashrealtor.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api.aakashrealtor.com;

    ssl_certificate     /etc/letsencrypt/live/api.aakashrealtor.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.aakashrealtor.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    server_tokens off;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # NOTE: CORS headers come from Laravel, not here.

    # Must be >= PHP post_max_size / nginx client_max_body_size in the container
    # so large image uploads aren't truncated at the edge.
    client_max_body_size 32m;

    location / {
        proxy_pass http://127.0.0.1:8080;       # in-stack "web" nginx → php-fpm
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
