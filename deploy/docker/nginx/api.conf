# ─────────────────────────────────────────────────────────────────────────────
#  api.conf — nginx server block for the Laravel API container ("web" service)
#
#  This nginx runs INSIDE the compose network in front of the php-fpm "api"
#  container. It serves Laravel's public/ directory and forwards .php requests
#  to php-fpm at api:9000. The host-level nginx (deploy/nginx-host/) terminates
#  TLS and reverse-proxies api.aakashrealtor.com -> this container on :80.
#
#  Mounted at /etc/nginx/conf.d/default.conf in the web service.
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name _;

    # Laravel's front controller lives in public/. The API app code is mounted
    # (or copied) so this path matches the api container's /var/www/html/public.
    root /var/www/html/public;
    index index.php;

    # ── Upload size: property listings allow large/multiple images ────────────
    # Keep in sync with PHP upload_max_filesize/post_max_size in php-prod.ini.
    client_max_body_size 32m;

    # ── gzip compression ──────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        application/json
        application/javascript
        application/xml
        text/css
        text/plain
        text/xml
        image/svg+xml;

    # ── Security headers ──────────────────────────────────────────────────────
    # HSTS is set at the TLS-terminating host nginx (it owns HTTPS); the rest are
    # safe to set here too.
    add_header X-Content-Type-Options    "nosniff"        always;
    add_header X-Frame-Options           "SAMEORIGIN"     always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection          "0"              always;
    # NOTE: CORS is handled by Laravel (config/cors.php + CORS_ALLOWED_ORIGINS),
    # NOT here — duplicating it in nginx causes double Access-Control headers.

    # Hide nginx version.
    server_tokens off;

    # ── Lightweight liveness endpoint for load balancers ──────────────────────
    # Laravel also exposes /up (HealthEndpoint). This /healthz avoids booting PHP.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # ── Static assets ─────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── PHP → php-fpm (api container) ─────────────────────────────────────────
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;

        # "api" is the compose service name; 9000 is php-fpm's listen port.
        fastcgi_pass api:9000;
        fastcgi_index index.php;

        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;

        # Allow slow image-processing requests to finish (matches PHP timeout).
        fastcgi_read_timeout 60s;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    # Block direct access to .php files other than the front controller.
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # Deny dotfiles / sensitive paths.
    location ~* \.(env|git|htaccess)$ {
        deny all;
    }
}
