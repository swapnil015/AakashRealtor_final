# ─────────────────────────────────────────────────────────────────────────────
#  nuxt.conf — OPTIONAL nginx reverse proxy in front of the Nuxt SSR server
#
#  The Nuxt 3 Nitro server already speaks HTTP on :3000 and can be exposed
#  directly. This config is provided for setups that prefer an nginx layer in
#  front of SSR (e.g. to serve /_nuxt static assets with long cache headers,
#  add gzip, or unify all containers behind one nginx image).
#
#  In the default docker-compose.yml the host nginx proxies straight to the
#  nuxt container, so this file is illustrative / opt-in.
# ─────────────────────────────────────────────────────────────────────────────

# Upstream = the Nuxt SSR container on the compose network.
upstream nuxt_ssr {
    server nuxt:3000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    server_tokens off;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types application/javascript application/json text/css text/plain image/svg+xml;

    # ── Long-cache the hashed build assets Nitro emits under /_nuxt/ ───────────
    # These filenames are content-hashed, so they're safe to cache forever.
    location /_nuxt/ {
        proxy_pass http://nuxt_ssr;
        proxy_set_header Host $host;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Everything else → SSR ─────────────────────────────────────────────────
    location / {
        proxy_pass http://nuxt_ssr;
        proxy_http_version 1.1;

        # Pass real client info so Nuxt/Nitro can build correct absolute URLs.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # WebSocket / HMR upgrade support (harmless in prod).
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 60s;
    }
}
