; ─────────────────────────────────────────────────────────────────────────────
;  www.conf — php-fpm pool overrides for the API container
;  Loaded as php-fpm.d/zz-www.conf (overrides the default www pool).
; ─────────────────────────────────────────────────────────────────────────────

[www]
user = www-data
group = www-data

; Listen on all interfaces inside the container so the nginx container can
; reach php-fpm at api:9000 over the compose network.
listen = 0.0.0.0:9000

; ── Process manager ─────────────────────────────────────────────────────────
; "dynamic" scales workers with load. Tune pm.max_children to:
;   (container memory budget for PHP) / (avg worker memory ~40-60MB).
pm = dynamic
pm.max_children = 20
pm.start_servers = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 8
; Recycle workers periodically to bound any slow memory growth.
pm.max_requests = 500

; ── Health & status endpoints ───────────────────────────────────────────────
; /ping is used by the Docker HEALTHCHECK (returns "pong").
ping.path = /ping
; /status is handy for FPM metrics (scrape from inside the network only).
pm.status_path = /status

; ── Logging ─────────────────────────────────────────────────────────────────
; Send worker output to the container log stream.
catch_workers_output = yes
decorate_workers_output = no
access.log = /dev/null
php_admin_value[error_log] = /dev/stderr
php_admin_flag[log_errors] = on

; Clear environment so only explicitly-passed env vars reach PHP.
clear_env = no
