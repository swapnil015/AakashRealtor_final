; ─────────────────────────────────────────────────────────────────────────────
;  php-prod.ini — production PHP runtime overrides for the API
;  Loaded as conf.d/zz-php-prod.ini.
; ─────────────────────────────────────────────────────────────────────────────

; Image uploads: property listings allow up to MAX_IMAGES_PER_LISTING images.
; Keep these in sync with nginx `client_max_body_size` in api.conf (32m).
upload_max_filesize=32M
post_max_size=40M

; Per-request memory. Intervention/Image resizing can be memory-hungry.
memory_limit=256M

; Long enough for batch image processing, short enough to shed stuck requests.
max_execution_time=60
max_input_time=60

; Never leak stack traces to API clients in production (Sentry captures them).
display_errors=Off
display_startup_errors=Off
log_errors=On
; Log to stderr so Docker captures it in the container log stream.
error_log=/dev/stderr

; Timezone matches APP_TIMEZONE.
date.timezone=Asia/Kathmandu

; Hide the PHP version from response headers.
expose_php=Off
