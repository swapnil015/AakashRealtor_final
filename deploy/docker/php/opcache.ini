; ─────────────────────────────────────────────────────────────────────────────
;  opcache.ini — production OPcache tuning for the Laravel API
;  Loaded as conf.d/zz-opcache.ini (the zz- prefix makes it load last so it
;  overrides any earlier defaults).
; ─────────────────────────────────────────────────────────────────────────────

opcache.enable=1
opcache.enable_cli=0

; Memory for compiled opcodes. 128 MB comfortably holds Laravel + vendor.
opcache.memory_consumption=128
; Pool for interned (deduplicated) strings.
opcache.interned_strings_buffer=16
; Max number of cached files. Laravel + deps is several thousand files.
opcache.max_accelerated_files=20000

; In production we deploy immutable images, so DON'T stat files on every
; request — this is the single biggest opcache win. Code only changes when a
; new image is deployed (and the container restarts, clearing the cache).
opcache.validate_timestamps=0
opcache.revalidate_freq=0

; Saves memory/CPU by not keeping doc-comment strings (Laravel doesn't need
; annotations at runtime).
opcache.save_comments=1
opcache.fast_shutdown=1

; JIT — modest tracing JIT helps CPU-bound paths a little. Conservative buffer.
opcache.jit=tracing
opcache.jit_buffer_size=64M
