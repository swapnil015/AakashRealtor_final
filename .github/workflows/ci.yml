name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:

jobs:
  # ──────────────────────────────────────────────────────────────
  backend:
    name: Backend (Pest + PostgreSQL)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: aakash_realtor_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo_pgsql, pgsql, mbstring, gd, zip, bcmath, intl
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: composer-${{ hashFiles('backend/composer.lock') }}

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run migrations + seed (PostgreSQL)
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: aakash_realtor_test
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
        run: php artisan migrate --seed --force

      - name: Run test suite
        run: php artisan test

  # ──────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (build + component tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - name: Component tests
        run: npx vitest run --passWithNoTests
      - name: Production build
        env:
          NUXT_PUBLIC_API_BASE: http://localhost:8000/api/v1
        run: npm run build
