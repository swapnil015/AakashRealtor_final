name: aakash_realtor
description: Aakash Realtor — premium real-estate marketplace mobile app.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter

  # Networking
  dio: ^5.4.0
  http_parser: ^4.0.2          # MediaType for multipart uploads

  # State management
  flutter_riverpod: ^2.5.1

  # Routing
  go_router: ^13.2.0

  # Image caching / display
  cached_network_image: ^3.3.1

  # Secure token storage
  flutter_secure_storage: ^9.0.0

  # Maps
  google_maps_flutter: ^2.6.0

  # Image picking (camera + gallery) for posting properties
  image_picker: ^1.0.7

  # Push notifications
  firebase_core: ^2.27.0
  firebase_messaging: ^14.7.19

  # Misc UI helpers
  cupertino_icons: ^1.0.6
  url_launcher: ^6.2.5          # phone / email launching for agent contact
  shimmer: ^3.0.0               # loading skeletons

dev_dependencies:
  flutter_lints: ^3.0.1
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/images/
